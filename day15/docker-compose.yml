services:
  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
    restart: on-failure

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: taskpass
      POSTGRES_DB: taskdb
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: